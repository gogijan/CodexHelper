name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore app
        run: dotnet restore .\CodexHelper\CodexHelper.csproj

      - name: Restore unit tests
        run: dotnet restore .\CodexHelper.Tests\CodexHelper.Tests.csproj

      - name: Build app
        run: dotnet build .\CodexHelper\CodexHelper.csproj -c Release --no-restore

      - name: Build unit tests
        run: dotnet build .\CodexHelper.Tests\CodexHelper.Tests.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test .\CodexHelper.Tests\CodexHelper.Tests.csproj -c Release --no-build --verbosity normal

      - name: Validate framework-dependent single-file publish
        run: dotnet publish .\CodexHelper\CodexHelper.csproj -p:PublishProfile=win-x64-singlefile-framework
